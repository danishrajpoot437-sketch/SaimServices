kind = "web"
previewPath = "/"
title = "SaimServices Utility Hub"
version = "1.0.0"
id = "artifacts/saim-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25259

[services.development]
run = "pnpm --filter @workspace/saim-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saim-hub", "run", "build" ]
publicDir = "artifacts/saim-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25259"
BASE_PATH = "/"
